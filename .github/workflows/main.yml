name: CI

on:
  push:
  pull_request:

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (syntax + ruff)
        run: |
          python -m compileall app.py
          ruff check .

      - name: Docker build
        run: |
          docker build -t aceest:ci .

      - name: Pytest inside container
        run: |
          docker run --rm aceest:ci python -m pytest
